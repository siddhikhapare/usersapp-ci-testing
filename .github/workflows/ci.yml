name: CI pipeline - Matrix + Digests 

on:
  push:
    branches:
      - main
  pull_request:

env:
  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}

# ==========================================================
# AUTH (can run in parallel with lint)
# ==========================================================
jobs:
  auth:
    name: Docker Hub Authentication
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

# ==========================================================
# JOB 1A: FRONTEND LINT (FAST FAIL)
# ==========================================================
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend 
        run: npm ci

      - name: Run frontend lint
        working-directory: ./frontend
        run: npm run lint

# ==========================================================
# JOB 1B: BACKEND LINT (FAST FAIL + CACHE)
# ==========================================================
  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend lint
        working-directory: ./backend
        run: npm run lint

# ==========================================================
# JOB 2: BUILD TEST IMAGES (Matrix) → CAPTURE DIGESTS
# ==========================================================
  build:
    name: Build ${{ matrix.service }} Test Image
    runs-on: ubuntu-latest
    needs: [auth, lint-frontend, lint-backend]

    strategy:
      matrix:
        service: [frontend, backend]
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: runner  # builder previously here
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: runner

    permissions:
      contents: read

    outputs:
      frontend-digest: ${{ steps.digest.outputs.frontend-digest }}
      backend-digest: ${{ steps.digest.outputs.backend-digest }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} test image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ matrix.service }}-test:${{ github.sha }}
          cache-from: |
            type=gha,scope=${{ matrix.service }}-build
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-build #latest tag here before above rather than v2.0
          platforms: linux/amd64
          provenance: false
          sbom: false

      - name: Store image digest
        id: digest
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            echo "frontend-digest=${{ steps.docker_build.outputs.digest }}" >> $GITHUB_OUTPUT
          else
            echo "backend-digest=${{ steps.docker_build.outputs.digest }}" >> $GITHUB_OUTPUT
          fi

# ==========================================================
# JOB 3: UNIT TESTS (Matrix) → USE DIGESTS
# ==========================================================
  test-unit:
    name: Test ${{ matrix.service }} Unit Tests
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service: [frontend, backend]
        include:
          - service: frontend
            test_command: npm test
          - service: backend
            test_command: npm test
      fail-fast: false

    permissions:
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run ${{ matrix.service }} unit tests (by digest)
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            docker run --rm \
              ${{ env.DOCKER_REGISTRY }}/frontend-test@${{ needs.build.outputs.frontend-digest }} \
              ${{ matrix.test_command }}
          else
            docker run --rm \
              ${{ env.DOCKER_REGISTRY }}/backend-test@${{ needs.build.outputs.backend-digest }} \
              ${{ matrix.test_command }}
          fi

# ==========================================================
# JOB 4: INTEGRATION TESTS → USE DIGESTS
# ==========================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, test-unit]

    permissions:
      contents: read

    env:
      # Non-sensitive (GitHub Variables)
      API_URL: ${{ vars.API_URL }}

      # Sensitive (GitHub Secrets)
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests with Docker Compose
        run: |
          export FRONTEND_TEST_IMAGE="${{ env.DOCKER_REGISTRY }}/frontend-test@${{ needs.build.outputs.frontend-digest }}"
          export BACKEND_TEST_IMAGE="${{ env.DOCKER_REGISTRY }}/backend-test@${{ needs.build.outputs.backend-digest }}"
          docker compose -f compose.test.yml up --exit-code-from sut

# ==========================================================
# JOB 5: SECURITY SCAN (Matrix) → SCAN BY DIGEST
# ==========================================================
  security-scan:
    name: Scan ${{ matrix.service }} for Vulnerabilities
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service: [frontend, backend]
      fail-fast: false

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Trivy scan - visibility (non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >
            ${{ env.DOCKER_REGISTRY }}/${{ matrix.service }}-test@
            ${{ matrix.service == 'frontend'
                && needs.build.outputs.frontend-digest
                || needs.build.outputs.backend-digest }}
          format: table
          exit-code: 0

      - name: Trivy scan - HIGH/CRITICAL (blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >
            ${{ env.DOCKER_REGISTRY }}/${{ matrix.service }}-test@
            ${{ matrix.service == 'frontend'
                && needs.build.outputs.frontend-digest
                || needs.build.outputs.backend-digest }}
          exit-code: 1
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          format: "sarif"
          output: "trivy-results-${{ matrix.service }}.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-${{ matrix.service }}.sarif"
          category: ${{ matrix.service }}

# ==========================================================
# JOB 6: SHIP → PROMOTE TEST IMAGES (SHA + LATEST, NO REBUILD)
# ==========================================================
  ship:
    name: Ship ${{ matrix.service }} Production Image
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [frontend, backend]

    permissions:
      contents: read

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote tested image to production (digest-safe)
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            DIGEST="${{ needs.build.outputs.frontend-digest }}"
          else
            DIGEST="${{ needs.build.outputs.backend-digest }}"
          fi

          SRC="${{ env.DOCKER_REGISTRY }}/${{ matrix.service }}-test@${DIGEST}"
          SHA_TAG="${{ env.DOCKER_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}"
          LATEST_TAG="${{ env.DOCKER_REGISTRY }}/${{ matrix.service }}:v2.0"

          echo "Pulling tested image: $SRC"
          docker pull $SRC

          echo "Tagging production images..."
          docker tag $SRC $SHA_TAG
          docker tag $SRC $LATEST_TAG

          echo "Pushing SHA tag: $SHA_TAG"
          docker push $SHA_TAG

          echo "Pushing latest tag: $LATEST_TAG"
          docker push $LATEST_TAG

# ==========================================================
# JOB 7: PR COMMENT (REFERENCES DIGEST-BASED IMAGES)
# ==========================================================
  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Find existing bot comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "Built images:"

      - name: Create/update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ✅ **All checks passed!**

            **Test images (DIGEST-BASED, immutable):**
            ```
            Frontend: ${{ env.DOCKER_REGISTRY }}/frontend-test@${{ needs.build.outputs.frontend-digest }}
            Backend:  ${{ env.DOCKER_REGISTRY }}/backend-test@${{ needs.build.outputs.backend-digest }}
            ```

            **Status:**
            - ✅ Unit tests passed
            - ✅ Integration tests passed
            - ✅ Security scans passed


